<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CabX — Create Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-wrap">

  <!-- Hero panel -->
  <div class="auth-hero">
    <div class="hero-content">
      <div class="hero-badge">🚖 Premium Cab Service</div>
      <div class="brand">CabX</div>
      <p class="tagline">Your ride, your rules.</p>
    </div>
  </div>

  <!-- Form panel -->
  <div class="auth-panel" style="background: var(--bg);">
    <div class="auth-form-wrap">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join CabX — it's free</p>

      <div class="alert alert-error" id="regError"></div>
      <div class="alert alert-success" id="regSuccess"></div>

      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" id="regFirst" placeholder="John" />
        </div>
        <div class="form-group">
          <label>Surname</label>
          <input type="text" id="regLast" placeholder="Doe" />
        </div>
      </div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 characters" />
      </div>

      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="regConfirm" placeholder="Repeat password" />
      </div>

      <button class="btn btn-primary" id="regBtn" onclick="handleRegister()">
        Create Account
      </button>

      <div class="auth-link">
        Already have an account? <a href="index.html">Sign in</a>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
  // Only redirect if we have both a token AND a valid stored customer
  const _tok = localStorage.getItem('cabx_token');
  const _cust = localStorage.getItem('cabx_customer');
  if (_tok && _cust && _cust !== 'null') window.location.href = 'dashboard.html';

  async function handleRegister() {
    const btn  = document.getElementById('regBtn');
    const err  = document.getElementById('regError');
    const ok   = document.getElementById('regSuccess');

    const firstName = document.getElementById('regFirst').value.trim();
    const lastName  = document.getElementById('regLast').value.trim();
    const email     = document.getElementById('regEmail').value.trim();
    const password  = document.getElementById('regPassword').value;
    const confirm   = document.getElementById('regConfirm').value;

    err.classList.remove('show'); ok.classList.remove('show');

    if (!firstName || !lastName || !email || !password) {
      err.textContent = 'Please fill in all fields.'; err.classList.add('show'); return;
    }
    if (password !== confirm) {
      err.textContent = 'Passwords do not match.'; err.classList.add('show'); return;
    }
    if (password.length < 6) {
      err.textContent = 'Password must be at least 6 characters.'; err.classList.add('show'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';

    try {
      await API.registerCustomer({ firstname: firstName, surname: lastName, email, password });
      ok.textContent = 'Account created! Redirecting to login…';
      ok.classList.add('show');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } catch (e) {
      err.textContent = e.message || 'Registration failed. Please try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
</script>
</body>
</html>
